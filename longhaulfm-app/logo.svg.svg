  viewBox="0 0 400 400"
>
  <!-- Background Circle -->
  <circle
    cx="200"
    cy="200"
    r="180"
    fill="#1B3A52"
    stroke="#DAA520"
    stroke-width="8"
  />
  
  <!-- Antenna Tip -->
  <path
    stroke="#DAA520"
